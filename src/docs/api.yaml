openapi: 3.0.0
info:
  title: Chicken Problem API
  version: 1.0.0
  description: API for authentication endpoints

paths:
  /api/auth/register:
    post:
      summary: Register user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserInput'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUserInput'
      responses:
        '200':
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    RegisterUserInput:
      type: object
      required:
        - name
        - email
        - password
        - role
      properties:
        name:
          type: string
          example: Zein Tonconi
        email:
          type: string
          format: email
          example: zein.tonconi1@gmail.com
        password:
          type: string
          format: password
          example: "12345678"
        role:
          type: string
          example: ADMIN
          enum:
            - ADMIN
            - USER
            - VENDOR

    LoginUserInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: zein.tonconi1@gmail.com
        password:
          type: string
          format: password
          example: "12345678"

    AuthData:
      type: object
      required:
        - name
        - token
      properties:
        name:
          type: string
          example: Zein Tonconi
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    AuthSuccessResponse:
      type: object
      required:
        - success
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: User registered successfully
        data:
          $ref: '#/components/schemas/AuthData'

    ErrorResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid credentials